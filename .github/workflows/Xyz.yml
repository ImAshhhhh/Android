name: Android 14 x86_64 Remote Access

on:
  workflow_dispatch:   # manual trigger only

jobs:
  emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # adjust as needed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          mv cmdline-tools latest
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH

      - name: Install Android 14 x86_64 system image
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "emulator" "platforms;android-34" "system-images;android-34;google_apis;x86_64"

      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd -n android14 -k "system-images;android-34;google_apis;x86_64" -d "pixel_6" -f

      - name: Start emulator
        run: |
          $ANDROID_HOME/emulator/emulator -avd android14 -no-window -no-audio -gpu swiftshader_indirect -no-boot-anim -port 5554 &
          adb -s emulator-5554 wait-for-device
          # Wait for boot to finish
          while [ "`adb -s emulator-5554 shell getprop sys.boot_completed | tr -d '\r'`" != "1" ]; do sleep 2; done
          echo "Emulator is ready"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build ws-scrcpy
        run: |
          git clone https://github.com/NetrisTV/ws-scrcpy.git
          cd ws-scrcpy
          npm install
          npm run build

      - name: Start ws-scrcpy server
        run: |
          cd ws-scrcpy
          nohup npm start > ../ws-scrcpy.log 2>&1 &
          sleep 5
          echo "ws-scrcpy running on port 8000"

      - name: Setup Cloudflare Tunnel and print URL
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared
          nohup cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          sleep 10
          TUNNEL_URL=$(grep -o 'https://[^ ]*\.trycloudflare\.com' tunnel.log | head -1)
          echo "=================================================="
          echo "  📱 Open this URL in your browser:"
          echo "  $TUNNEL_URL"
          echo "=================================================="
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV

      - name: Keep alive (press Cancel to stop)
        run: |
          echo "Device is available at: $TUNNEL_URL"
          echo "The job will stay alive for the configured timeout."
          sleep 3600   # 1 hour (adjust to match timeout-minutes)
