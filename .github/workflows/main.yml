name: Android Emulator (ARM64) CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android-tests:
    runs-on: macos-latest  # This is an ARM64 (Apple Silicon) runner
    strategy:
      matrix:
        api-level: [30]  # ARM64 system images limited to fewer API levels
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run instrumented tests on ARM64 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: arm64-v8a
          target: default
          profile: pixel_7_pro  # Modern ARM device profile
          cores: 4
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Emulator is ready! Add your test commands here"
