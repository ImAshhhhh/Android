name: Android Emulator Screenshot Capture

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        api-level: [21, 23, 29]
        target: [default, google_apis]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create screenshots directory
        run: mkdir -p screenshots

      - name: Take screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_7_pro
          cores: 2
          ram-size: 2048M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb exec-out screencap -p > screenshots/home-api${{ matrix.api-level }}-${{ matrix.target }}.png

      - name: Upload screenshots as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-api${{ matrix.api-level }}-${{ matrix.target }}
          path: screenshots/
          retention-days: 7

      - name: Display screenshot download link
        if: always()
        run: |
          echo "============================================"
          echo "📸 Screenshot Artifact Download Link:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts"
          echo "============================================"
          echo "Artifact name: screenshots-api${{ matrix.api-level }}-${{ matrix.target }}"
